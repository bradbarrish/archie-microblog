<header class="site-header">
  <div class="container">
    <h1 class="site-title">
      <a href="/">{{ .Site.Title }}</a>
    </h1>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
      <button class="theme-toggle" aria-label="Toggle dark mode">dark</button>
    </nav>
  </div>
</header>
